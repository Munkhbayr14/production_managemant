version: "3.8"
services:
  dev-db:
    image: postgres:13
    ports:
      - 5434:5432
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: product_management
    networks:
      - product_management
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: redis_cache
    ports:
      - 6379:6379
    networks:
      - product_management

  api:
    build: .
    container_name: nestjs_api
    ports:
      - 3000:3000
    depends_on:
      - dev-db
      - redis
    environment:
      DATABASE_URL: postgresql://postgres:1234@dev-db:5432/product_management
      REDIS_HOST: process.env.REDIS_HOST
      REDIS_PORT: process.env.REDIS_PORT
    networks:
      - product_management
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
networks:
  product_management:

volumes:
  postgres_data:
